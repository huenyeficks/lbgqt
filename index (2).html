<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nordlicht Digitalwerk</title>
  <meta name="description" content="Diese Website befindet sich im Aufbau." />
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --accent2: #a78bfa;
      --border: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.28), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(167, 139, 250, 0.22), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 24px;
    }

    .orb {
      position: fixed;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    .orb.one {
      left: -70px;
      top: 20%;
      background: var(--accent);
    }

    .orb.two {
      right: -80px;
      bottom: 12%;
      background: var(--accent2);
      animation-delay: -3s;
    }

    .card {
      width: min(720px, 100%);
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid var(--border);
      border-radius: 32px;
      background: var(--card);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      text-align: center;
      animation: rise 700ms ease-out both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: translateX(-100%);
      animation: shine 4s ease-in-out infinite;
    }

    .content { position: relative; z-index: 1; }

    .logo {
      width: 76px;
      height: 76px;
      border-radius: 22px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 34px rgba(56, 189, 248, 0.25);
      animation: pulse 2.8s ease-in-out infinite;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: -1px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 13px;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 8vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    p {
      margin: 22px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(17px, 2.5vw, 21px);
      line-height: 1.55;
    }

    .loader {
      width: min(360px, 80%);
      height: 12px;
      margin: 34px auto 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .loader span {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      animation: loading 1.8s ease-in-out infinite;
    }

    .footer {
      margin-top: 34px;
      color: rgba(248, 250, 252, 0.72);
      font-size: 14px;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(22px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-28px) scale(1.08); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    @keyframes loading {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(260%); }
    }

    @keyframes shine {
      0%, 35% { transform: translateX(-100%); }
      70%, 100% { transform: translateX(100%); }
    }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <main class="card" aria-label="Website im Aufbau">
    <div class="content">
      <div class="logo" aria-hidden="true">ND</div>
      <p class="eyebrow">Nordlicht Digitalwerk</p>
      <h1>Hier entsteht etwas Neues.</h1>
      <p>Unsere Website wird gerade vorbereitet. Bald findest du hier weitere Informationen.</p>
      <div class="loader" aria-hidden="true"><span></span></div>
      <div class="footer">Bitte schau später noch einmal vorbei.</div>
    </div>
  </main>
</body>
</html>
